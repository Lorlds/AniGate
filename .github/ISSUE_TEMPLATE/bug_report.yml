name: Bug report
description: Report a reproducible AniGate problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, auth tokens, cookies,
        private remote URLs, or private repository content.
  - type: input
    id: version
    attributes:
      label: AniGate version
      description: Output of `anigate version` or the commit SHA.
      placeholder: "0.1.2"
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - HTTP
        - both
        - not sure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Start AniGate with ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Redacted config shape
      description: Include only relevant config with secrets removed.
      render: json
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste bounded, redacted logs.
      render: text
