name: Feature request
description: Suggest a bounded AniGate capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should AniGate do?
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Safety boundary
      description: How should this stay bounded and auditable?
      placeholder: "No raw shell; workspace-limited paths; bounded output; explicit config..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other designs or workarounds.
