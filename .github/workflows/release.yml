name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            out="anigate-${GITHUB_REF_NAME}-${goos}-${goarch}"
            mkdir -p "dist/${out}"
            for bin in anigate-mini anigate-max anigate; do
              GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "dist/${out}/${bin}" "./cmd/${bin}"
            done
            cp README.md README.zh-CN.md LICENSE "dist/${out}/"
            tar -C dist -czf "dist/${out}.tar.gz" "$out"
            rm -rf "dist/${out}"
          done
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.tar.gz --title "$GITHUB_REF_NAME" --generate-notes
