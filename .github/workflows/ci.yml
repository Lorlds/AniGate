name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - run: go test ./...
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build -trimpath -o bin/anigate ./cmd/anigate
      - run: ./bin/anigate tools --config configs/anigate.example.json
